name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  rust:
    name: Rust (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - features: ""
            name: "default"
          - features: "--features python"
            name: "python"
          - features: "--features r"
            name: "r"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install R
        if: matrix.name == 'r'
        uses: r-lib/actions/setup-r@v2

      - name: Check
        run: cargo check ${{ matrix.features }}

      - name: Test
        run: cargo test ${{ matrix.features }}

      - name: Clippy
        run: cargo clippy ${{ matrix.features }} -- -D warnings

      - name: Doc check
        run: cargo doc --no-deps ${{ matrix.features }}
        env:
          RUSTDOCFLAGS: "-D warnings"

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install maturin pytest numpy pandas

      - name: Build rustree wheel
        run: maturin build --features python

      - name: Install rustree wheel
        run: pip install --force-reinstall target/wheels/*.whl

      - name: Run tests
        run: pytest tests/python/
