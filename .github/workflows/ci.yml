name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - features: ""
            name: "default"
          - features: "--features python"
            name: "python"
          - features: "--features r"
            name: "r"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check (${{ matrix.name }})
        run: cargo check ${{ matrix.features }}

      - name: Test (${{ matrix.name }})
        run: cargo test ${{ matrix.features }}

      - name: Clippy (${{ matrix.name }})
        run: cargo clippy ${{ matrix.features }} -- -D warnings

      - name: Doc check (${{ matrix.name }})
        run: cargo doc --no-deps ${{ matrix.features }}
        env:
          RUSTDOCFLAGS: "-D warnings"

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install maturin pytest numpy pandas

      - name: Build rustree wheel
        run: maturin build --features python

      - name: Install rustree wheel
        run: pip install --force-reinstall target/wheels/*.whl

      - name: Run tests
        run: pytest tests/python/
