name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format check
        run: cargo fmt --check

      - name: Check
        run: cargo check --features python

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy --features python -- -D warnings

      - name: Doc check
        run: cargo doc --no-deps --features python
        env:
          RUSTDOCFLAGS: "-D warnings"

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install maturin pytest numpy pandas

      - name: Build and install rustree
        run: maturin develop --features python

      - name: Run tests
        run: pytest tests/python/
